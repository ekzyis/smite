on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scenario: [encrypted_bytes, noise, init, ir]
      # one scenario at a time to reuse cache
      max-parallel: 1
      # don't skip other scenarios if one fails
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: workloads/${{ inputs.target }}/Dockerfile
          build-args: SCENARIO=${{ matrix.scenario }}
          cache-from: type=gha,scope=${{ inputs.target }}
          cache-to: type=gha,mode=max,scope=${{ inputs.target }}
